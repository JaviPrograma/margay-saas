services:
  - type: web
    name: margay-saas
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/veterinaria.db
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
