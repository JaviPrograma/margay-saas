{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <h2 class="mb-3">Mi cuenta</h2>
        <p class="text-muted mb-4">Desde acá la veterinaria puede cambiar su contraseña de acceso.</p>

        <div class="mb-4">
          <div><strong>Nombre:</strong> {{ user['nombre'] }}</div>
          <div><strong>Email:</strong> {{ user['email'] }}</div>
          <div><strong>Veterinaria:</strong> {{ empresa_nombre }}</div>
        </div>

        <form method="post">
          <div class="mb-3">
            <label class="form-label">Contraseña actual</label>
            <input type="password" class="form-control" name="actual_password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nueva contraseña</label>
            <input type="password" class="form-control" name="new_password" minlength="6" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Repetir nueva contraseña</label>
            <input type="password" class="form-control" name="repeat_password" minlength="6" required>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary" type="submit">Guardar nueva contraseña</button>
            <a class="btn btn-secondary" href="{{ url_for('home') }}">Volver</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
