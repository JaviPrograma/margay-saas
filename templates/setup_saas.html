<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VetCloud | Configuración inicial</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{min-height:100vh;background:linear-gradient(135deg,#f6f1fb,#efe7fb);display:flex;align-items:center}
    .card{border:none;border-radius:22px;box-shadow:0 12px 35px rgba(70,30,120,.12)}
    .brand{color:#7b4ab5}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card p-4">
        <div class="text-center mb-4">
          <h2 class="brand mb-1">Configurar VetCloud</h2>
          <p class="text-muted mb-0">Creá la primera veterinaria y su usuario administrador</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Nombre de la veterinaria</label>
            <input class="form-control" name="empresa" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Nombre del administrador</label>
            <input class="form-control" name="nombre" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input class="form-control" type="password" name="password" minlength="6" required>
          </div>
          <button class="btn btn-primary w-100">Crear instalación</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
