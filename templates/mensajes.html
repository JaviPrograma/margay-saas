
{% extends "base.html" %}
{% block content %}
<h2>Mensajes automáticos</h2>

<div class="card p-3 mb-3 shadow-sm">
  <form method="post" action="{{ url_for('mensajes_guardar') }}">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Plantilla recordatorio mensualidad</label>
        <textarea name="tpl_mensual" rows="3" class="form-control">{{ tpl_mensual }}</textarea>
        <div class="form-text">Variables: {nombre} {mes} {anio} {CLINIC}</div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Plantilla clientes deudores</label>
        <textarea name="tpl_deuda" rows="3" class="form-control">{{ tpl_deuda }}</textarea>
        <div class="form-text">Variables: {nombre} {saldo} {CLINIC}</div>
      </div>
      <div class="col-md-3">
        <label class="form-label">Envío diario (hora HH:MM)</label>
        <input class="form-control" name="diario_hora" value="{{ diario_hora }}">
      </div>
      <div class="col-md-3 d-flex align-items-end">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="diario_on" name="diario_on" {% if diario_on %}checked{% endif %}>
          <label class="form-check-label" for="diario_on">Activar</label>
        </div>
      </div>
      <div class="col-md-6 d-flex align-items-end justify-content-end">
        <button class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </form>
</div>

<div class="card p-3 shadow-sm">
  <form class="row g-3" method="get" action="{{ url_for('mensajes_panel') }}">
    <div class="col-md-2">
      <label class="form-label">Año</label>
      <input type="number" class="form-control" name="anio" value="{{ anio }}">
    </div>
    <div class="col-md-2">
      <label class="form-label">Mes</label>
      <select class="form-select" name="mes">
        {% for m in range(1,13) %}
          <option value="{{ m }}" {{ 'selected' if m==mes else '' }}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-md-8 d-flex align-items-end gap-2">
      <a class="btn btn-outline-primary" href="{{ url_for('mensajes_preview', tipo='mensual', anio=anio, mes=mes) }}">Previsualizar — Mensualidades</a>
      <a class="btn btn-outline-secondary" href="{{ url_for('mensajes_preview', tipo='deuda', anio=anio, mes=mes) }}">Previsualizar — Deudores</a>
    </div>
  </form>
</div>
{% endblock %}
