<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VetCloud | Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{min-height:100vh;background:linear-gradient(135deg,#f6f1fb,#efe7fb);display:flex;align-items:center}
    .card{border:none;border-radius:22px;box-shadow:0 12px 35px rgba(70,30,120,.12)}
    .brand{color:#7b4ab5}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-4">
        <div class="text-center mb-4">
          <h2 class="brand mb-1">VetCloud</h2>
          <p class="text-muted mb-0">Ingresá a tu veterinaria</p>
        </div>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Veterinaria</label>
            <select class="form-select" name="empresa_id" required>
              <option value="">Seleccionar…</option>
              {% for e in empresas %}
                <option value="{{ e.id }}">{{ e.nombre }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input class="form-control" type="email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input class="form-control" type="password" name="password" required>
          </div>
          <button class="btn btn-primary w-100">Entrar</button>
        </form>
        <hr>
        <div class="small text-muted">
          Usuario migrado por defecto: <strong>admin@margay.local</strong><br>
          Contraseña por defecto: <strong>admin1234</strong>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
